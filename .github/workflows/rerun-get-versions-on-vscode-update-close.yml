name: Re-run version check on update issue close

on:
  issues:
    types:
      - closed

permissions:
  actions: write
  contents: read
  issues: read

jobs:
  rerun-version-check:
    if: contains(github.event.issue.labels.*.name, 'vscode-update')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Trigger get-versions workflow
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$GITHUB_REPOSITORY/actions/workflows/get-versions.yml/dispatches" \
            -f ref="${{ github.event.repository.default_branch }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}