name: Get latest versions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Read tracked version
        id: tracked
        run: |
          TRACKED=$(jq -r '.contributes.configuration.properties["copilotEnabler.latestVersionChecked"].default' package.json)
          echo "tracked=$TRACKED" >> "$GITHUB_OUTPUT"

      - name: Determine unreconciled VS Code releases
        id: versions
        run: |
          TRACKED="${{ steps.tracked.outputs.tracked }}"

          normalize_version() {
            IFS='.' read -r major minor patch <<EOF
          $1
          EOF
            patch=${patch:-0}
            echo "$major.$minor.$patch"
          }

          NORMALIZED_TRACKED=$(normalize_version "$TRACKED")
          CANDIDATES=$(
            gh release list --repo microsoft/vscode --limit 100 --json tagName --jq '.[].tagName' \
              | sed 's/^[^0-9]*//' \
              | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' \
              | while IFS= read -r version; do
                  normalized=$(normalize_version "$version")
                  if [ "$normalized" != "$NORMALIZED_TRACKED" ] \
                    && [ "$(printf '%s\n%s\n' "$NORMALIZED_TRACKED" "$normalized" | sort -V | head -n 1)" = "$NORMALIZED_TRACKED" ]; then
                    echo "$normalized"
                  fi
                done \
              | sort -V
          )

          if [ -z "$CANDIDATES" ]; then
            echo "new_version=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_VERSION=$(printf '%s\n' "$CANDIDATES" | head -n 1)
          LATEST_VERSION=$(printf '%s\n' "$CANDIDATES" | tail -n 1)

          echo "new_version=true" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Check for existing open issue
        id: existing
        if: steps.versions.outputs.new_version == 'true'
        run: |
          COUNT=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "vscode-update" \
            --state open \
            --json number \
            --jq 'length')
          echo "open_count=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create issue for new VS Code version
        if: steps.versions.outputs.new_version == 'true' && steps.existing.outputs.open_count == '0'
        run: |
          NEXT_VERSION="${{ steps.versions.outputs.next }}"
          LATEST_VERSION="${{ steps.versions.outputs.latest }}"
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "[VSCode Update]: $NEXT_VERSION" \
            --label "vscode-update" \
            --body "## VS Code has been updated!

          A new VS Code release needs to be reconciled. This workflow now advances one release at a time so the catalog can be reviewed incrementally.

          **Next version to review:** $NEXT_VERSION
          **Previously tracked:** ${{ steps.tracked.outputs.tracked }}
          **Latest available release:** $LATEST_VERSION

          Release notes: https://github.com/microsoft/vscode/releases/tag/$NEXT_VERSION

          Once the catalog has been updated, bump \`copilotEnabler.latestVersionChecked\` in \`package.json\` to \`$NEXT_VERSION\`.

          After this issue is closed, the version check workflow will run again and open the next update issue if newer releases are still pending."
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
